<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Licencias VXvue</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f4f4f8; color: #1a1a2e; }
  header { background: #1a1a2e; color: white; padding: 18px 32px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 20px; font-weight: 600; }
  header span { background: #0f6e56; color: white; padding: 3px 10px; border-radius: 20px; font-size: 12px; }
  .config-bar { background: white; border-bottom: 1px solid #e0e0e8; padding: 12px 32px; display: flex; gap: 12px; align-items: center; }
  .config-bar input { border: 1px solid #ccc; border-radius: 6px; padding: 7px 12px; font-size: 13px; }
  .config-bar input:first-child { width: 340px; }
  .config-bar input:nth-child(2) { width: 220px; }
  .config-bar button { background: #185FA5; color: white; border: none; border-radius: 6px; padding: 8px 18px; cursor: pointer; font-size: 13px; }
  .container { max-width: 1100px; margin: 28px auto; padding: 0 24px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat { background: white; border-radius: 10px; padding: 20px 24px; border-left: 4px solid #ccc; }
  .stat.total { border-color: #185FA5; }
  .stat.activo { border-color: #1D9E75; }
  .stat.mora { border-color: #D85A30; }
  .stat-num { font-size: 32px; font-weight: 700; }
  .stat-label { font-size: 13px; color: #666; margin-top: 4px; }
  .card { background: white; border-radius: 10px; padding: 24px; margin-bottom: 20px; }
  .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #1a1a2e; }
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .form-row input { border: 1px solid #ccc; border-radius: 6px; padding: 8px 12px; font-size: 14px; flex: 1; min-width: 160px; }
  .btn { border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 13px; font-weight: 500; }
  .btn-primary { background: #185FA5; color: white; }
  .btn-success { background: #1D9E75; color: white; }
  .btn-danger { background: #D85A30; color: white; }
  .btn-gray { background: #e8e8f0; color: #444; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 12px; font-weight: 600; color: #888; padding: 8px 12px; border-bottom: 1px solid #eee; text-transform: uppercase; letter-spacing: .5px; }
  td { padding: 12px; border-bottom: 1px solid #f0f0f8; font-size: 14px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-on { background: #E1F5EE; color: #085041; }
  .badge-off { background: #FAECE7; color: #4A1B0C; }
  .actions { display: flex; gap: 6px; }
  .mono { font-family: monospace; font-size: 12px; background: #f4f4f8; padding: 2px 6px; border-radius: 4px; }
  .empty { text-align: center; color: #999; padding: 40px; font-size: 14px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a2e; color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; display: none; z-index: 999; }
</style>
</head>
<body>

<header>
  <h1>🔒 Panel de Licencias</h1>
  <span>VXvue</span>
</header>

<div class="config-bar">
  <input type="text" id="servidor" placeholder="URL del servidor (ej: https://mi-app.railway.app)" />
  <input type="password" id="api_secret" placeholder="Clave secreta (API_SECRET)" />
  <button onclick="guardarConfig()">Conectar</button>
  <span id="estado-conexion" style="font-size:13px;color:#888;"></span>
</div>

<div class="container">
  <div class="stats">
    <div class="stat total"><div class="stat-num" id="total">—</div><div class="stat-label">Total clientes</div></div>
    <div class="stat activo"><div class="stat-num" id="activos">—</div><div class="stat-label">Activos</div></div>
    <div class="stat mora"><div class="stat-num" id="mora">—</div><div class="stat-label">En mora</div></div>
  </div>

  <div class="card">
    <h2>➕ Registrar nuevo cliente</h2>
    <div class="form-row">
      <input type="text" id="nuevo-nombre" placeholder="Nombre del cliente (ej: Clínica San Rafael)" />
      <input type="text" id="nuevo-equipo" placeholder="ID del equipo (MAC del computador)" />
      <input type="text" id="nuevo-notas" placeholder="Notas (opcional)" />
      <button class="btn btn-primary" onclick="registrarCliente()">Registrar</button>
    </div>
  </div>

  <div class="card">
    <h2>📋 Clientes registrados</h2>
    <table id="tabla">
      <thead>
        <tr>
          <th>#</th>
          <th>Cliente</th>
          <th>ID Equipo</th>
          <th>Estado</th>
          <th>Registro</th>
          <th>Notas</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="clientes-body">
        <tr><td colspan="7" class="empty">Conecte el servidor para ver los clientes</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let CONFIG = { servidor: '', secret: '' };

function guardarConfig() {
  CONFIG.servidor = document.getElementById('servidor').value.replace(/\/$/, '');
  CONFIG.secret = document.getElementById('api_secret').value;
  localStorage.setItem('lv_config', JSON.stringify(CONFIG));
  cargarClientes();
}

function cargarConfig() {
  const saved = localStorage.getItem('lv_config');
  if (saved) {
    CONFIG = JSON.parse(saved);
    document.getElementById('servidor').value = CONFIG.servidor;
    document.getElementById('api_secret').value = CONFIG.secret;
  }
}

async function api(path, method='GET', body=null) {
  const opts = {
    method,
    headers: { 'X-API-Secret': CONFIG.secret, 'Content-Type': 'application/json' }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(CONFIG.servidor + path, opts);
  return res.json();
}

async function cargarClientes() {
  try {
    document.getElementById('estado-conexion').textContent = 'Conectando...';
    const data = await api('/admin/clientes');
    if (data.error) throw new Error(data.error);
    document.getElementById('estado-conexion').textContent = '✅ Conectado';
    renderTabla(data);
    document.getElementById('total').textContent = data.length;
    document.getElementById('activos').textContent = data.filter(c => c.activo).length;
    document.getElementById('mora').textContent = data.filter(c => !c.activo).length;
  } catch(e) {
    document.getElementById('estado-conexion').textContent = '❌ Error: ' + e.message;
  }
}

function renderTabla(clientes) {
  const tbody = document.getElementById('clientes-body');
  if (!clientes.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">No hay clientes registrados aún</td></tr>';
    return;
  }
  tbody.innerHTML = clientes.map(c => `
    <tr>
      <td>${c.id}</td>
      <td><strong>${c.nombre}</strong></td>
      <td><span class="mono">${c.equipo_id}</span></td>
      <td><span class="badge ${c.activo ? 'badge-on' : 'badge-off'}">${c.activo ? '✅ Activo' : '🔴 Mora'}</span></td>
      <td>${c.fecha_registro}</td>
      <td style="color:#888;font-size:13px">${c.notas || '—'}</td>
      <td>
        <div class="actions">
          ${c.activo
            ? `<button class="btn btn-danger" onclick="suspender(${c.id})">Suspender</button>`
            : `<button class="btn btn-success" onclick="activar(${c.id})">Activar</button>`
          }
        </div>
      </td>
    </tr>
  `).join('');
}

async function registrarCliente() {
  const nombre = document.getElementById('nuevo-nombre').value.trim();
  const equipo_id = document.getElementById('nuevo-equipo').value.trim().replace(/:/g,'').toUpperCase();
  const notas = document.getElementById('nuevo-notas').value.trim();
  if (!nombre || !equipo_id) { toast('Complete nombre e ID del equipo'); return; }
  const res = await api('/admin/clientes', 'POST', { nombre, equipo_id, notas });
  if (res.error) { toast('Error: ' + res.error); return; }
  toast('✅ ' + res.mensaje);
  document.getElementById('nuevo-nombre').value = '';
  document.getElementById('nuevo-equipo').value = '';
  document.getElementById('nuevo-notas').value = '';
  cargarClientes();
}

async function suspender(id) {
  if (!confirm('¿Suspender licencia? El cliente no podrá usar VXvue.')) return;
  const res = await api(`/admin/clientes/${id}/suspender`, 'POST');
  toast('🔴 ' + res.mensaje);
  cargarClientes();
}

async function activar(id) {
  const res = await api(`/admin/clientes/${id}/activar`, 'POST');
  toast('✅ ' + res.mensaje);
  cargarClientes();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

cargarConfig();
if (CONFIG.servidor) cargarClientes();
</script>
</body>
</html>
